<section class="trip-footer">
  <div class="trip-footer-card">
    <img class="trip-footer-wash" src="assets/icons/Dest.png" alt="" />
    <div class="trip-footer-overlay"></div>

    <div class="trip-footer-heading">
      <h2 class="trip-footer-title">
        CUSTOMISE YOUR <span>{{ destinationName.toUpperCase() }}</span> TRIP
      </h2>
      <p class="trip-footer-subtitle">Popular choices from travellers</p>
    </div>

    <div class="trip-footer-options">
      <div class="trip-option">
        <span class="trip-option-icon">🧑‍🤝‍🧑</span>
        <div class="trip-option-copy">
          <span class="trip-option-label">GROUP TYPE</span>
          <span class="trip-option-value">Couple with kids</span>
        </div>
        <span class="trip-option-caret">⌄</span>
      </div>

      <div class="trip-option">
        <span class="trip-option-icon">🗓️</span>
        <div class="trip-option-copy">
          <span class="trip-option-label">DURATION</span>
          <span class="trip-option-value">7-10 days</span>
        </div>
        <span class="trip-option-caret">⌄</span>
      </div>

      <div class="trip-option">
        <span class="trip-option-icon">💰</span>
        <div class="trip-option-copy">
          <span class="trip-option-label">BUDGET (PER HEAD)</span>
          <span class="trip-option-value">₹80K - ₹1.4L</span>
        </div>
        <span class="trip-option-caret">⌄</span>
      </div>

      <div class="trip-option">
        <span class="trip-option-icon">🍽️</span>
        <div class="trip-option-copy">
          <span class="trip-option-label">FOOD PREFS.</span>
          <span class="trip-option-value">Vegetarian</span>
        </div>
        <span class="trip-option-caret">⌄</span>
      </div>

      <div class="trip-option trip-option-last">
        <span class="trip-option-icon">🏝️</span>
        <div class="trip-option-copy">
          <span class="trip-option-label">OCCASION</span>
          <span class="trip-option-value">Leisure</span>
        </div>
        <span class="trip-option-caret">⌄</span>
      </div>
    </div>
  </div>

  <div class="trip-footer-toolbar">
    <div class="trip-footer-chips">
      <button class="trip-chip" type="button">Villa w/ Pool</button>
      <button class="trip-chip" type="button">With Kids</button>
      <button class="trip-chip" type="button">7-14 Days</button>
      <button class="trip-chip trip-chip-active" type="button">Vegetarian</button>
      <button class="trip-chip" type="button">Honeymoon</button>
      <button class="trip-chip" type="button">Offbeat Places</button>
      <button class="trip-chip" type="button">Balinese Massage</button>
    </div>

    <div class="trip-footer-actions">
      <span class="trip-results">40 results found</span>
      <button class="trip-sort" type="button">
        <span class="trip-sort-icon">⇅</span>
        <span>Sort</span>
      </button>
    </div>
  </div>

  <div class="trip-footer-more">
    <button class="trip-more" type="button">
      <span>View More</span>
      <span class="trip-more-caret" aria-hidden="true"></span>
    </button>
  </div>
</section>
